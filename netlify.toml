[build]
  # Tell Netlify that the actual Next.js application lives inside this specific monorepo folder
  base = "apps/web"
  
  # The standard Next.js build command
  command = "npm run build"
  
  # Netlify specifically targets the magical .next folder for serverless deployments
  publish = ".next"

[build.environment]
  # Ensure Netlify installs the hoisted root dependencies properly
  NETLIFY_USE_YARN = "false"
  NPM_FLAGS = "--workspace=apps/web --include-workspace-root"
