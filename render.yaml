services:
  - type: web
    name: brokai-api
    env: node
    # Since this is a monorepo, we use the root directory to ensure dependencies install correctly
    rootDir: .
    buildCommand: npm install && npm run db:generate -w apps/server && npm run build -w apps/server
    startCommand: npm start -w apps/server
    envVars:
      - key: DATABASE_URL
        sync: false # Requires manual entry in the dashboard for security
      - key: PORT
        value: 3001
